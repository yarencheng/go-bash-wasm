name: Deploy Static Site to GitHub Pages

# Trigger the workflow when changes are pushed to the main branch
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Run Go tests
        run: go test -v ./...

      - name: Build WASM
        run: |
          GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o main.wasm ./cmd/go-bash-wasm/

      - name: Optimize WASM
        run: |
          wasm-opt -O4 \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-simd \
            --enable-tail-call \
            --enable-threads \
            --inlining \
            --inlining-optimizing \
            --precompute \
            --precompute-propagate \
            --gufa \
            --simplify-locals \
            --coalesce-locals \
            --reorder-locals \
            --dce \
            --dae \
            main.wasm -o main_fast.wasm
          mv main_fast.wasm ui/static/main.wasm

      - name: Copy wasm_exec.js
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ui/static/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Run UI tests
        run: npm run test
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'ui/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4