name: Deploy Static Site to GitHub Pages

# Trigger the workflow when changes are pushed to the main branch
on:
  push:
    branches: ["main"] # Change to 'master' if that is your default branch
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just building and deploying
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use the Node version your project requires
          cache: 'npm' # Use 'yarn' or 'pnpm' if applicable

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build # Ensure this command outputs your files to a 'dist' or 'build' folder

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Update this path to match your build output folder!
          # For Vite/Vue it is usually './dist'
          # For React (Create React App) it is usually './build'
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4