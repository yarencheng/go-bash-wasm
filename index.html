<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Go Bash WASM – Interactive Terminal</title>
  <meta name="description" content="An interactive Bash simulator compiled to WebAssembly and running entirely in the browser." />

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <!-- Go WASM glue – defines globalThis.fs and the Go constructor -->
  <script src="wasm_exec.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d1117;
      font-family: 'Fira Code', 'Cascadia Code', Menlo, Monaco, monospace;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── title bar ── */
    #titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      background: linear-gradient(90deg, #161b22 0%, #1a1f2e 100%);
      border-bottom: 1px solid #21262d;
      user-select: none;
    }

    .dots { display: flex; gap: 6px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,.6);
    }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    #titlebar-label {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #8b949e;
      letter-spacing: .04em;
    }

    #status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      transition: background .3s, color .3s;
    }
    #status-badge.ready  { background: #0d3624; color: #3fb950; border-color: #238636; }
    #status-badge.error  { background: #3d1c1c; color: #ff7b72; border-color: #6e1c1c; }

    /* ── terminal area ── */
    #terminal-container {
      flex: 1;
      padding: 4px 6px 6px;
      overflow: hidden;
    }

    /* make the xterm canvas fill the container */
    .xterm, .xterm-viewport, .xterm-screen { height: 100% !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <div class="dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <span id="titlebar-label">go-bash-wasm — browser terminal</span>
    <span id="status-badge">loading…</span>
  </div>

  <div id="terminal-container"></div>
</div>

<script>
(async function init() {
  /* ── 1. Set up xterm.js ─────────────────────────────────────────── */
  const term = new Terminal({
    cursorBlink : true,
    convertEol  : true,        // auto-converts \n → \r\n
    scrollback  : 5000,
    fontFamily  : '"Fira Code", "Cascadia Code", Menlo, Monaco, monospace',
    fontSize    : 14,
    lineHeight  : 1.5,
    theme: {
      background    : '#0d1117',
      foreground    : '#c9d1d9',
      cursor        : '#58a6ff',
      cursorAccent  : '#0d1117',
      selectionBackground: 'rgba(88,166,255,.25)',
      black         : '#484f58',
      red           : '#ff7b72',
      green         : '#3fb950',
      yellow        : '#d29922',
      blue          : '#58a6ff',
      magenta       : '#bc8cff',
      cyan          : '#39c5cf',
      white         : '#b1bac4',
      brightBlack   : '#6e7681',
      brightRed     : '#ffa198',
      brightGreen   : '#56d364',
      brightYellow  : '#e3b341',
      brightBlue    : '#79c0ff',
      brightMagenta : '#d2a8ff',
      brightCyan    : '#56d4dd',
      brightWhite   : '#f0f6fc',
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();
  window.addEventListener('resize', () => fitAddon.fit());

  /* ── 2. Splash ──────────────────────────────────────────────────── */
  term.writeln('\x1b[1;34m   ____       ____            _       __        ___    ____  __  __ \x1b[0m');
  term.writeln('\x1b[1;34m  / ___| ___ | __ )  __ _ ___| |__    \\ \\      / / \\  / ___||  \\/  |\x1b[0m');
  term.writeln('\x1b[1;34m | |  _ / _ \\|  _ \\ / _` / __| \'_ \\    \\ \\ /\\ / / _ \\|___ \\| |\\/| |\x1b[0m');
  term.writeln('\x1b[1;34m | |_| | (_) | |_) | (_| \\__ \\ | | |    \\ V  V / ___ \\___) | |  | |\x1b[0m');
  term.writeln('\x1b[1;34m  \\____|\\___/|____/ \\__,_|___/_| |_|     \\_/\\_/_/   \\_\\____/|_|  |_|\x1b[0m');
  term.writeln('');
  term.writeln('\x1b[90m  Bash simulator compiled to WebAssembly · running in your browser\x1b[0m');
  term.writeln('');
  term.writeln('\x1b[33m  Loading main.wasm…\x1b[0m');

  /* ── 3. Intercept Go stdout/stderr BEFORE go.run() ─────────────── */
  const decoder = new TextDecoder();

  // wasm_exec.js stores everything on globalThis.fs
  const origWriteSync = globalThis.fs.writeSync.bind(globalThis.fs);
  globalThis.fs.writeSync = function (fd, buf) {
    if (fd === 1 || fd === 2) {
      term.write(decoder.decode(buf));
      return buf.length;
    }
    return origWriteSync(fd, buf);
  };

  // Some Go versions route through the async fs.write; keep both consistent.
  const origWrite = globalThis.fs.write.bind(globalThis.fs);
  globalThis.fs.write = function (fd, buf, offset, length, position, callback) {
    if (fd === 1 || fd === 2) {
      const n = globalThis.fs.writeSync(fd, buf.subarray(offset, offset + length));
      callback(null, n);
      return;
    }
    return origWrite(fd, buf, offset, length, position, callback);
  };

  /* ── 4. Load & run WASM ─────────────────────────────────────────── */
  const badge = document.getElementById('status-badge');

  let wasmReady = false;
  try {
    const go     = new Go();
    const result = await WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject);

    // go.run() returns a promise but we do NOT await it here.
    // The Go main() goroutine will block on the pipe and keep the
    // runtime alive; the JS event loop continues normally.
    go.run(result.instance);

    // Give the Go runtime a tick to initialise and register writeStdin.
    await new Promise(r => setTimeout(r, 150));

    wasmReady = true;
    badge.textContent = 'ready';
    badge.className   = 'ready';
    term.writeln('\x1b[32m  Ready! Type a command and press Enter.\x1b[0m');
    term.writeln('');
    term.focus();
  } catch (err) {
    badge.textContent = 'error';
    badge.className   = 'error';
    term.writeln(`\x1b[31m  Failed to load WASM: ${err.message}\x1b[0m`);
    console.error(err);
    return;
  }

  /* ── 5. Wire keyboard → Go stdin ────────────────────────────────── */
  let lineBuffer = '';

  term.onData(data => {
    if (!wasmReady) return;

    for (let i = 0; i < data.length; i++) {
      const char = data[i];
      const code = data.charCodeAt(i);

      switch (code) {
        case 13:  // Enter
          term.write('\r\n');
          if (typeof window.writeStdin === 'function') {
            window.writeStdin(lineBuffer);
          }
          lineBuffer = '';
          break;

        case 127: // DEL (Backspace in most terminals)
        case 8:   // BS
          if (lineBuffer.length > 0) {
            lineBuffer = lineBuffer.slice(0, -1);
            term.write('\b \b');
          }
          break;

        case 4:   // Ctrl+D → EOF
          if (typeof window.closeStdin === 'function') {
            window.closeStdin();
          }
          break;

        case 3:   // Ctrl+C → interrupt (cosmetic only for now)
          term.write('^C\r\n');
          lineBuffer = '';
          break;

        default:
          // Printable ASCII and valid UTF-8 continuation bytes
          if (code >= 32) {
            lineBuffer += char;
            term.write(char);
          }
          break;
      }
    }
  });
})();
</script>
</body>
</html>
